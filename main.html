<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form method="post">
	      <label for="name">Name</label>
	      <input id="name" type="text" required>
	      <br><br>
	      <label for="email">Email</label>
	      <input id="email" type="Email" required>
	      <br><br>
		  <label for="gender_m,gender_f">Gender</label>
		  <br>
          <input id="gender_m" type="radio" name="gender" required>
          <label for="gender_m">Male</label>

         <input id="gender_f" type="radio" name="gender" required>
         <label for="gender_f">Female</label>
		  <br><br>
		  <label for="cars">Car Brands</label>
		  <select id="cars">
			  <option>BMW</option>
			  <option>Audi</option>
			  <option>Mercedez</option>
		  </select>
		  <br><br>
	      <label for="carage">Car Age</label>
	      <input id="carage" type="number" required>
		  <br><br>
		  <label for="dop">Date of Purchase</label>
	      <input id="dop" type="date" required>
	      <br><br>
		  <label for="password">Password</label>
		<input id="password"type="password" required>
		<br>
		<br>
		<br>
		<center><button type="submit">Submit</button></center>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
